services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ENABLE_SCHEDULER: ${APP_ENABLE_SCHEDULER:-true}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-5}
      SCHEDULER_LEASE_SECONDS: ${SCHEDULER_LEASE_SECONDS:-120}
      SCHEDULER_MAX_TASK_RETRIES: ${SCHEDULER_MAX_TASK_RETRIES:-3}
      SCHEDULER_RETRY_BACKOFF_SECONDS: ${SCHEDULER_RETRY_BACKOFF_SECONDS:-30}
      SCHEDULER_RETRY_BACKOFF_MAX_SECONDS: ${SCHEDULER_RETRY_BACKOFF_MAX_SECONDS:-900}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/ci_ai_codereview}
      MONGODB_DB: ${MONGODB_DB:-ci_ai_codereview}
      MONGO_MOCK: ${MONGO_MOCK:-false}
      LLM_URL: ${LLM_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-4}
      LLM_MAX_TOOL_ROUNDS: ${LLM_MAX_TOOL_ROUNDS:-30}
      FULL_SCAN_MAX_TOOL_ROUNDS: ${FULL_SCAN_MAX_TOOL_ROUNDS:-60}
      LLM_MAX_CONSECUTIVE_EMPTY_ROUNDS: ${LLM_MAX_CONSECUTIVE_EMPTY_ROUNDS:-3}
      LLM_FILE_TIMEOUT_SECONDS: ${LLM_FILE_TIMEOUT_SECONDS:-600}
      LLM_JSON_RETRY_TIMES: ${LLM_JSON_RETRY_TIMES:-2}
      LLM_CONTEXT_COMPRESS_ROUNDS: ${LLM_CONTEXT_COMPRESS_ROUNDS:-4}
      LLM_CONTEXT_COMPRESS_TOKEN_THRESHOLD: ${LLM_CONTEXT_COMPRESS_TOKEN_THRESHOLD:-0}
      LLM_MAX_CONTEXT_TOKENS: ${LLM_MAX_CONTEXT_TOKENS:-58888}
      LLM_CONTEXT_SOFT_RATIO: ${LLM_CONTEXT_SOFT_RATIO:-0.60}
      LLM_CONTEXT_HARD_RATIO: ${LLM_CONTEXT_HARD_RATIO:-0.80}
      LLM_CONTEXT_COMPRESSION_LLM_ENABLED: ${LLM_CONTEXT_COMPRESSION_LLM_ENABLED:-true}
      LLM_CONTEXT_KEEP_RECENT_MESSAGES: ${LLM_CONTEXT_KEEP_RECENT_MESSAGES:-6}
      LLM_CONTEXT_SUMMARY_MAX_CHARS: ${LLM_CONTEXT_SUMMARY_MAX_CHARS:-2000}
      LLM_MOCK_ENABLED: ${LLM_MOCK_ENABLED:-true}
      DIFF_TOKEN_THRESHOLD: ${DIFF_TOKEN_THRESHOLD:-10000}
      DIFF_CONTEXT_LINES: ${DIFF_CONTEXT_LINES:-10}
      SCAN_BATCH_SIZE: ${SCAN_BATCH_SIZE:-20}
      SCAN_BATCH_STRATEGY: ${SCAN_BATCH_STRATEGY:-by-language}
      FULL_SCAN_TOKEN_BUDGET: ${FULL_SCAN_TOKEN_BUDGET:-0}
      FULL_SCAN_BATCH_DEDUP_ENABLED: ${FULL_SCAN_BATCH_DEDUP_ENABLED:-true}
      FULL_SCAN_BATCH_DEDUP_LLM_ENABLED: ${FULL_SCAN_BATCH_DEDUP_LLM_ENABLED:-true}
      FULL_SCAN_BATCH_DEDUP_MIN_COMMENTS: ${FULL_SCAN_BATCH_DEDUP_MIN_COMMENTS:-4}
      FULL_SCAN_PROJECT_SUMMARY_ENABLED: ${FULL_SCAN_PROJECT_SUMMARY_ENABLED:-true}
      FULL_SCAN_PROJECT_SUMMARY_LLM_ENABLED: ${FULL_SCAN_PROJECT_SUMMARY_LLM_ENABLED:-true}
      FULL_SCAN_PROJECT_SUMMARY_MAX_ISSUES: ${FULL_SCAN_PROJECT_SUMMARY_MAX_ISSUES:-200}
      REVIEW_RESUME_ENABLED: ${REVIEW_RESUME_ENABLED:-true}
      CODE_REPOSITORY_ROOT: ${CODE_REPOSITORY_ROOT:-/repositories}
      REVIEW_EXCLUDE_DIRS: ${REVIEW_EXCLUDE_DIRS:-.git,.opencodereview,__pycache__,node_modules,.venv,venv,dist,build,.pytest_cache}
      REVIEW_EXCLUDE_PATHS: ${REVIEW_EXCLUDE_PATHS:-MCAL,Math,General,COMM,CANVector,main.c,Wdg,Smu,SafeTlib,SafeTpack,ERU_BSW,Eth_generated,Dem,DemConfig,FiM,FiMConfig,VStdLib,Etpu,freertos,FW_LIB,StartUp,Os_Stubs.c,Os_TaskInfr.c,.vscode,.history,**pycache**,BootloaderPlus_CData.c,PrjVer.c,PrjVer.h,SoftVer_Release.h}
      REVIEW_RULES_PATH: ${REVIEW_RULES_PATH:-}
      REVIEW_RELOCATION_ENABLED: ${REVIEW_RELOCATION_ENABLED:-true}
      REVIEW_FILTER_ENABLED: ${REVIEW_FILTER_ENABLED:-true}
      REVIEW_FILTER_MIN_CONFIDENCE: ${REVIEW_FILTER_MIN_CONFIDENCE:-0.45}
      REVIEW_EVIDENCE_REQUIRED: ${REVIEW_EVIDENCE_REQUIRED:-true}
      REVIEW_LINE_EVIDENCE_MIN_SIMILARITY: ${REVIEW_LINE_EVIDENCE_MIN_SIMILARITY:-0.55}
      REVIEW_ALLOW_HEURISTIC_RELOCATION: ${REVIEW_ALLOW_HEURISTIC_RELOCATION:-false}
      REVIEW_CHANGE_MANIFEST_LIMIT: ${REVIEW_CHANGE_MANIFEST_LIMIT:-500}
      REVIEW_RELATED_FILES_ENABLED: ${REVIEW_RELATED_FILES_ENABLED:-true}
      REVIEW_RELATED_FILE_LIMIT: ${REVIEW_RELATED_FILE_LIMIT:-8}
      REVIEW_RELATED_DIFF_MAX_CHARS: ${REVIEW_RELATED_DIFF_MAX_CHARS:-12000}
      REVIEW_STATIC_ANALYSIS_ENABLED: ${REVIEW_STATIC_ANALYSIS_ENABLED:-true}
      REVIEW_STATIC_ANALYSIS_SARIF_PATHS: ${REVIEW_STATIC_ANALYSIS_SARIF_PATHS:-}
      REVIEW_STATIC_ANALYSIS_MAX_FINDINGS: ${REVIEW_STATIC_ANALYSIS_MAX_FINDINGS:-2000}
      REVIEW_STATIC_ANALYSIS_MAX_REPORT_BYTES: ${REVIEW_STATIC_ANALYSIS_MAX_REPORT_BYTES:-20971520}
      REVIEW_TOOL_MAX_READ_LINES: ${REVIEW_TOOL_MAX_READ_LINES:-500}
      REVIEW_TOOL_MAX_SEARCH_MATCHES: ${REVIEW_TOOL_MAX_SEARCH_MATCHES:-100}
      REVIEW_TOOL_MAX_FILE_BYTES: ${REVIEW_TOOL_MAX_FILE_BYTES:-2097152}
      REVIEW_TOOL_TIMEOUT_SECONDS: ${REVIEW_TOOL_TIMEOUT_SECONDS:-10}
      REVIEW_SEMANTIC_INDEX_ENABLED: ${REVIEW_SEMANTIC_INDEX_ENABLED:-true}
      REVIEW_SEMANTIC_INDEX_MAX_FILES: ${REVIEW_SEMANTIC_INDEX_MAX_FILES:-5000}
      REVIEW_SEMANTIC_INDEX_MAX_FILE_BYTES: ${REVIEW_SEMANTIC_INDEX_MAX_FILE_BYTES:-2097152}
      REVIEW_SEMANTIC_INDEX_MAX_RESULTS: ${REVIEW_SEMANTIC_INDEX_MAX_RESULTS:-100}
      REVIEW_SEMANTIC_INDEX_BUILD_TIMEOUT_SECONDS: ${REVIEW_SEMANTIC_INDEX_BUILD_TIMEOUT_SECONDS:-60}
      MOCK_REVIEW_VERSION: ${MOCK_REVIEW_VERSION:-/app}
      MOCK_TASK_TYPE: ${MOCK_TASK_TYPE:-2}
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ${CODE_REPOSITORY_HOST_ROOT:-./demo_repos}
        target: ${CODE_REPOSITORY_CONTAINER_ROOT:-/repositories}
        read_only: true
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
